name: havenly_solutions
description: "Havenly Solutions — Personal Safety Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.5.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # ── SECURITY AND AUTHENTICATION ─────────────────────────────
  # flutter_secure_storage: encrypted key-value store using Keychain
  # (iOS) and Android Keystore. Never use SharedPreferences for tokens.
  flutter_secure_storage: ^9.2.2

  # cryptography: AES-256-GCM encryption for sensitive profile fields.
  # Used to encrypt ID numbers and passport numbers before SQLite storage.
  cryptography: ^2.7.0

  bcrypt: ^1.1.3

  # local_auth: biometric authentication (fingerprint, face ID).
  # Maps to iOS Touch/Face ID and Android BiometricPrompt.
  # On Huawei/Honor this uses the EMUI biometric system.
  local_auth: ^2.3.0

  # ── LOCATION AND SOS ────────────────────────────────────────
  # geolocator: GPS satellite location. Works on all Android forks
  # including HarmonyOS — uses hardware GPS chip not Google services.
  geolocator: ^13.0.2

  # connectivity_plus: network status detection. Used to decide which
  # SOS layers are available at trigger time.
  connectivity_plus: ^6.1.0

  # permission_handler: runtime permission management for all platforms.
  permission_handler: ^11.3.1

  # nearby_connections: Android Nearby Connections API for Layer 3
  # Bluetooth mesh relay. Android only — iOS excluded via platform guard.
  nearby_connections: ^4.1.0

  # ── COMMUNICATION ───────────────────────────────────────────
  # url_launcher: opens SMS compose, maps links, and phone dialer.
  url_launcher: ^6.3.1

  # ── BACKGROUND SERVICES ─────────────────────────────────────
  # flutter_background_service: keeps SOS heartbeat alive when app
  # is in background or screen is off. Required for survivability.
  flutter_background_service: ^5.0.5

  # ── STORAGE ─────────────────────────────────────────────────
  # sqflite: SQLite for all local data. Primary offline store.
  sqflite: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.4

  # shared_preferences: non-sensitive display state only.
  # Never store tokens, keys, or personal data here.
  shared_preferences: ^2.3.3

  # ── NETWORKING ──────────────────────────────────────────────
  # dio: HTTP client with interceptors for auth token injection,
  # retry logic, and error normalisation.
  dio: ^5.7.0

  # ── STATE MANAGEMENT ────────────────────────────────────────
  provider: ^6.1.2

  # ── DEVICE ───────────────────────────────────────────────
  vibration: ^2.0.1
  uuid: ^4.4.2
  intl: ^0.19.0
  image_picker: ^1.1.2
  flutter_contacts: ^1.1.9
  socket_io_client: ^2.0.3+1

  geocoding: ^3.0.0
  flutter_local_notifications: ^17.0.0

  # Maps — added Week 4
  # google_maps_flutter: ^2.10.0

  # SMS — added Week 3
  # android_intent_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/