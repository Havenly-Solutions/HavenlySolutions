name: havenly
description: Havenly Solutions - Your Haven. Your Community. Always On.
publish_to: none

version: 1.0.0+1

environment:
  sdk: '>=3.5.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^13.0.0

  # State management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Secure storage
  flutter_secure_storage: ^9.2.2

  # Maps & Location
  google_maps_flutter: ^2.17.0
  geolocator: ^13.0.0
  geocoding: ^3.0.0

  # Local database
  sqflite: ^2.3.3+1
  path: ^1.9.1
  path_provider: ^2.1.5

  # HTTP
  dio: ^5.4.3

  # Real-time
  socket_io_client: ^2.0.3+1

  # Authentication
  firebase_core: ^3.4.1
  firebase_auth: ^5.1.0
  firebase_messaging: ^15.1.0

  # SMS (direct device SMS — no internet)
  telephony: ^0.2.0

  # Bluetooth mesh
  nearby_connections: ^4.3.0

  # Vibration & haptics
  vibration: ^2.0.0

  # Audio (Amber Alert)
  audioplayers: ^5.2.1

  # Image picker (posts, profile, missing persons)
  image_picker: ^1.1.2

  # Face detection (missing person photo validation)
  google_mlkit_face_detection: ^0.10.0

  # Image processing
  image: ^4.1.7
  flutter_image_compress: ^2.3.0
  crypto: ^3.0.3

  # Guided tour
  tutorial_coach_mark: ^1.3.3

  # Connectivity
  connectivity_plus: ^6.0.3

  # Localisation
  intl: ^0.20.2

  # UI utilities
  cached_network_image: ^3.3.1
  shimmer: ^3.0.0
  timeago: ^3.7.1
  flutter_svg: ^2.0.9
  google_fonts: ^6.2.1

  # Device info
  device_info_plus: ^10.1.2
  package_info_plus: ^8.3.1

  # Biometric & Crypto
  local_auth: ^2.3.0
  bcrypt: ^1.1.3
  shared_preferences: ^2.2.5
  permission_handler: ^11.3.1
  url_launcher: ^6.3.2
  uuid: ^4.5.3
  cryptography: ^2.9.0
  encrypt: ^5.0.3
  camera: ^0.11.0+1
  flutter_background_service: ^5.1.0
  flutter_local_notifications: ^18.0.0
  flutter_contacts: 1.1.9+2
  audio_session: ^0.1.18
  just_audio: ^0.9.36
  timezone: ^0.9.4
  flutter_cache_manager: ^3.3.2
  octo_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  riverpod_generator: ^2.4.0
  build_runner: ^2.4.9

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/audio/amber_alert.mp3
