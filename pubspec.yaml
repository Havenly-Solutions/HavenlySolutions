name: havenly_solutions
description: "Havenly Solutions — Personal Safety Platform"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  provider: ^6.1.5+1

  # Networking
  http: ^1.6.0

  # Real-time
  socket_io_client: ^3.1.4

  # Local database — offline SOS queue
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5

  # Secure storage — JWT + PIN
  flutter_secure_storage: ^10.0.0
  shared_preferences: ^2.5.5

  # Firebase
  firebase_core: ^4.7.0
  firebase_auth: ^6.4.0
  firebase_messaging: ^16.2.0

  # Location
  geolocator: ^14.0.2

  # Media
  image_picker: ^1.2.2
  file_picker: ^11.0.2
  cached_network_image: ^3.4.1

  # Device
  device_info_plus: ^12.4.0
  connectivity_plus: ^7.1.1
  permission_handler: ^11.4.0

  # Biometric login
  local_auth: ^2.3.0

  # Animations
  lottie: ^3.3.1

  # Maps — added Week 4
  # google_maps_flutter: ^2.10.0

  # SMS — added Week 3
  # android_intent_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/